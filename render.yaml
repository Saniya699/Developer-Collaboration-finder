services:
  - type: web
    name: developer-collaboration-finder-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://developer-collaboration-finder-web.onrender.com
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: DATABASE_URL
        fromDatabase:
          name: developer-collaboration-finder-db
          property: connectionString
      - key: JWT_ACCESS_TOKEN_EXPIRES_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_EXPIRES_MINUTES
        value: "1440"
      - key: RESUME_MAX_FILE_BYTES
        value: "8388608"

  - type: web
    name: developer-collaboration-finder-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://developer-collaboration-finder-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: developer-collaboration-finder-db
    databaseName: dev_collaboration_finder
    user: dcf_user

